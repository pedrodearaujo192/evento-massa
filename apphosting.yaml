# Configurações para o Firebase App Hosting
# Documentação: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Instâncias e recursos para o servidor Next.js
  minInstances: 0
  maxInstances: 10
  memoryMiB: 512
  cpu: 1

# Configurações de ambiente para o build e runtime
env:
  - variable: NODE_ENV
    value: production
